<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Age Review Manager Pro (Dark)</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        /* 다크 모드 테마 정의 (기능은 유지, 디자인만 변경) */
        :root { 
            --bg-body: #121212; /* 아주 어두운 회색 바탕 */
            --bg-container: #1e1e1e; /* 약간 밝은 회색 컨테이너 */
            --text-main: #e0e0e0; /* 연한 회색 글씨 (가독성 최적화) */
            --text-muted: #a0a0a0; /* 흐린 회색 글씨 */
            --border: #333333; /* 어두운 테두리 */
            --primary: #3795ff; /* 밝은 파란색 포인트 */
            --success: #2ecc71; /* 밝은 초록색 포인트 */
            --danger: #ef5350; /* 밝은 빨간색 포인트 */
            --hover: #2a2a2a; /* 호버 시 색상 */
        }
        
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main);
            margin: 0; 
            padding: 15px; 
            line-height: 1.5;
        }
        
        .container { 
            max-width: 800px; 
            margin: auto; 
            background-color: var(--bg-container); 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.5); /* 더 깊은 그림자 */
        }
        
        h2 { 
            font-size: 1.3rem; 
            margin-top: 0;
            margin-bottom: 20px; 
            color: var(--text-main); 
            border-left: 4px solid var(--primary); 
            padding-left: 12px; 
            font-weight: 700;
        }
        
        textarea { 
            width: 100%; 
            height: 180px; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            padding: 15px; 
            font-size: 14px; 
            margin-bottom: 18px; 
            background-color: rgba(255,255,255,0.03); /* 아주 투명한 백색 바탕 */
            color: var(--text-main);
            resize: vertical;
            transition: border-color 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn-box { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        button { 
            padding: 15px; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 15px; 
            color: white; 
            transition: transform 0.1s, opacity 0.2s; 
        }
        button:active { transform: scale(0.98); }
        button:hover { opacity: 0.9; }
        
        .btn-analyze { background-color: var(--primary); grid-column: span 2; font-size: 16px; }
        .btn-excel { background-color: var(--success); }
        .btn-reset { background-color: #444; color: var(--text-main); }

        /* 모바일 대응 다크 테이블 */
        .table-wrapper { 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch; 
            border: 1px solid var(--border);
            border-radius: 10px;
            background-color: rgba(255,255,255,0.01);
        }
        table { width: 100%; border-collapse: collapse; min-width: 480px; font-size: 14px; }
        th { 
            background-color: rgba(255,255,255,0.05); 
            padding: 14px 10px; 
            border-bottom: 2px solid var(--border); 
            cursor: pointer; 
            white-space: nowrap; 
            color: var(--text-muted);
            font-weight: 600;
            text-align: center;
        }
        th:hover { background-color: var(--hover); color: var(--text-main); }
        
        /* 정렬 화살표 아이콘 표시 */
        th::after { content: ' ↕'; font-size: 0.9em; opacity: 0.3; }
        
        td { 
            padding: 14px 10px; 
            border-bottom: 1px solid var(--border); 
            text-align: center; 
            color: var(--text-main);
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: var(--hover); }
        
        .excluded-row { color: var(--danger); font-weight: bold; }
        .score-row { 
            font-weight: bold; 
            color: var(--primary); 
            background-color: rgba(55, 149, 255, 0.1); /* 투명한 파란색 배경 */
            border-radius: 6px; 
            display: inline-block;
            padding: 4px 10px;
        }
        
        /* 모바일 미세 조정 */
        @media (max-width: 480px) {
            body { padding: 10px; }
            .container { padding: 18px; border-radius: 12px; }
            h2 { font-size: 1.15rem; }
            button { font-size: 14px; padding: 13px; }
            textarea { height: 160px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>서버 성과 분석기 (다크 모드)</h2>
    <textarea id="reviewText" placeholder="여기에 구글 리뷰 텍스트를 붙여넣으세요... (모바일 환경 지원)"></textarea>
    
    <div class="btn-box">
        <button class="btn-analyze" onclick="analyze()">정밀 분석 시작</button>
        <button class="btn-excel" onclick="exportExcel()">엑셀 파일 저장</button>
        <button class="btn-reset" onclick="location.reload()">초기화</button>
    </div>

    <div class="table-wrapper">
        <table id="resultTable">
            <thead>
                <tr>
                    <th onclick="sortTable(0)">이름</th>
                    <th onclick="sortTable(1)">Good (유효)</th>
                    <th onclick="sortTable(2)">Bad (1-3점)</th>
                    <th onclick="sortTable(3)">제외 (Emily/CJ)</th>
                    <th onclick="sortTable(4)">최종 점수</th>
                </tr>
            </thead>
            <tbody id="resultBody">
                </tbody>
        </table>
    </div>
</div>

<script>
// 사용자 정의 분석 로직 (건드리지 않음)
const serverConfig = {
    "Mason": ["Mason"], "Eggi": ["Eggi", "Eggie"], "Karol": ["Karol"],
    "Nathan": ["Nathan", "Minyoung"], "Emily": ["Emily"], "Phil": ["Phil", "Phill"],
    "Menkhu": ["Menkhu"], "Danny": ["Danny"], "CJ": ["CJ"], "Damon": ["Damon"],
    "Aarohan": ["Aarohan"], "AJ": ["AJ"], "MingMan": ["MingMan"], "Britney": ["Britney"]
};

// 제외할 키워드 (raise 제외함)
const redFlags = ["billed", "charged", "billing", "clean the bathroom", "cleaning the bathroom", "left us", "long periods"];

function analyze() {
    const rawText = document.getElementById('reviewText').value;
    // 구글 리뷰의 시간 표시(ago)를 기준으로 리뷰 블록 분리
    const reviewBlocks = rawText.split(/(?=\d+ (?:hour|day|week|month)s? ago)|(?=a (?:hour|day|week|month) ago)/gi);
    
    let stats = {};
    Object.keys(serverConfig).forEach(name => stats[name] = { good: 0, bad: 0, excluded: 0 });

    reviewBlocks.forEach(block => {
        const lowerBlock = block.toLowerCase();
        
        Object.entries(serverConfig).forEach(([mainName, aliases]) => {
            // 이름이 독립된 단어로 쓰였는지 확인 (Regex 사용)
            const isMentioned = aliases.some(alias => {
                const regex = new RegExp(`\\b${alias}\\b`, 'i');
                return regex.test(lowerBlock);
            });

            if (isMentioned) {
                const hasRedFlag = redFlags.some(flag => lowerBlock.includes(flag));
                // 별점 1-3점 확인
                const isBad = lowerBlock.includes("1 star") || lowerBlock.includes("2 stars") || lowerBlock.includes("3 stars");

                if (hasRedFlag) stats[mainName].excluded++;
                else if (isBad) stats[mainName].bad++;
                else stats[mainName].good++;
            }
        });
    });

    render(stats);
}

function render(stats) {
    const tbody = document.getElementById('resultBody');
    tbody.innerHTML = '';
    // 최종 스코어(Good 점수) 기준 내림차순 정렬하여 출력
    Object.entries(stats).sort((a,b) => b[1].good - a[1].good).forEach(([name, data]) => {
        if (data.good + data.bad + data.excluded === 0) return;
        tbody.innerHTML += `<tr>
            <td><strong>${name}</strong></td>
            <td>${data.good}</td>
            <td>${data.bad}</td>
            <td class="excluded-row">${data.excluded}</td>
            <td><span class="score-row">${data.good}</span></td>
        </tr>`;
    });
}

// 테이블 정렬 기능 (숫자/문자열 자동 감지)
function sortTable(n) {
    const table = document.getElementById("resultTable");
    let rows, switching, i, x, y, shouldSwitch, dir, switchcount = 0;
    switching = true; dir = "desc"; // 기본 내림차순
    while (switching) {
        switching = false; rows = table.rows;
        for (i = 1; i < (rows.length - 1); i++) {
            shouldSwitch = false;
            x = rows[i].getElementsByTagName("TD")[n];
            y = rows[i + 1].getElementsByTagName("TD")[n];
            // x, y 내용물 가져오기 (점수 스팬 태그 내부 값 포함)
            let xContent = x.querySelector('.score-row') ? x.querySelector('.score-row').innerText : x.innerText;
            let yContent = y.querySelector('.score-row') ? y.querySelector('.score-row').innerText : y.innerText;
            
            let xVal = isNaN(parseFloat(xContent)) ? xContent.toLowerCase() : parseFloat(xContent);
            let yVal = isNaN(parseFloat(yContent)) ? yContent.toLowerCase() : parseFloat(yContent);
            
            if (dir == "asc") { if (xVal > yVal) { shouldSwitch = true; break; } }
            else { if (xVal < yVal) { shouldSwitch = true; break; } }
        }
        if (shouldSwitch) { rows[i].parentNode.insertBefore(rows[i + 1], rows[i]); switching = true; switchcount++; }
        else if (switchcount == 0 && dir == "desc") { dir = "asc"; switching = true; }
    }
}

// 화면에 보이는 정렬된 상태 그대로 엑셀 저장
function exportExcel() {
    const table = document.getElementById("resultTable");
    if (table.rows.length <= 1) { alert("먼저 데이터를 분석해주세요."); return; }
    const wb = XLSX.utils.table_to_book(table, { sheet: "PerformanceReport" });
    const filename = `IronAge_Review_Report_${new Date().toISOString().slice(0,10)}.xlsx`;
    XLSX.writeFile(wb, filename);
}
</script>

</body>
</html>
